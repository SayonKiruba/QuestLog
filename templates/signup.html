{% extends "base.html" %}
{% block title %}Sign up — QuestLog{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Create account</h1>
        <p>Join QuestLog and start tracking your games.</p>

        <form method="POST" action="{{ url_for('signup_page') }}">
            <div class="field">
                <label for="username">Username</label>
                <input id="username" name="username" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" required>
            </div>
            <div class="field">
                <label for="is_admin">
                    <input id="is_admin" name="is_admin" type="checkbox">
                    Create admin account
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign up</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
            · <a href="{{ url_for('home') }}">Back to Discover</a>
        </p>
    </div>
</div>
{% endblock %}
